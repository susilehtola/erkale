
name: CMake CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-24.04

    name: Ubuntu 24.04 Build and Test
    steps:
      - uses: actions/checkout@v4

      - name: Resolve dependencies
        # System packages for the deps that Ubuntu ships. libcint and
        # libwignernj are not packaged and are fetched and built from
        # source by CMake automatically.
        run: sudo apt-get update && sudo apt-get install -y cmake gfortran libgsl-dev liblapack-dev libarmadillo-dev libeigen3-dev libxc-dev libhdf5-serial-dev nlohmann-json3-dev

      - name: Compile
        run: cmake -B build && cmake --build build -j$(nproc)

      - name: Test
        run: ctest --test-dir build --output-on-failure
